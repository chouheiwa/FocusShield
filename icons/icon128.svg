<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="64" cy="64" r="56" fill="url(#grad1)" stroke="#fff" stroke-width="4" filter="url(#shadow)"/>
  
  <!-- Hook符号主体 -->
  <path d="M40 48 C40 32, 56 32, 56 48 L56 80 C56 88, 64 88, 64 80 L64 64" 
        stroke="#fff" stroke-width="10" stroke-linecap="round" fill="none"/>
  
  <!-- 小圆点 -->
  <circle cx="72" cy="64" r="6" fill="#fff"/>
  
  <!-- 装饰元素 -->
  <circle cx="64" cy="64" r="45" stroke="#fff" stroke-width="1" opacity="0.2" fill="none"/>
  <circle cx="64" cy="64" r="35" stroke="#fff" stroke-width="1" opacity="0.3" fill="none"/>
  
  <!-- 装饰线条 -->
  <path d="M32 32 L96 96" stroke="#fff" stroke-width="2" opacity="0.2"/>
  <path d="M96 32 L32 96" stroke="#fff" stroke-width="2" opacity="0.2"/>
  
  <!-- 小装饰点 -->
  <circle cx="32" cy="32" r="2" fill="#fff" opacity="0.4"/>
  <circle cx="96" cy="32" r="2" fill="#fff" opacity="0.4"/>
  <circle cx="32" cy="96" r="2" fill="#fff" opacity="0.4"/>
  <circle cx="96" cy="96" r="2" fill="#fff" opacity="0.4"/>
</svg>